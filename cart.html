<script id="cart-fix">

let cart = JSON.parse(localStorage.getItem("cart")) || {};

function renderCartPage(){

  const empty = document.querySelector(".cart-empty");
  const full = document.querySelector(".cart-full");
  const bottomBar = document.querySelector(".bottom-bar");

  let itemsContainer = document.getElementById("cart-items");
  let totalPrice = 0;

  // إذا فاضي
  if(Object.keys(cart).length === 0){
    empty.classList.remove("hidden");
    full.classList.add("hidden");
    bottomBar.style.display = "none"; 
    return;
  }

  // إذا فيه منتجات
  empty.classList.add("hidden");
  full.classList.remove("hidden");
  bottomBar.style.display = "block";

  itemsContainer.innerHTML = "";

  Object.keys(cart).forEach(name => {

    let item = cart[name];
    totalPrice += item.price * item.qty;

    itemsContainer.innerHTML += `
      <div class="item">

        <div class="item-info">
          <h3>${name}</h3>
          <span>${item.price} ر.س</span>
        </div>

        <div class="item-actions">

          <div class="qty">
            <button onclick="minus('${name}')">-</button>
            <span>${item.qty}</span>
            <button onclick="plus('${name}')">+</button>
          </div>

          <i class="fa-solid fa-trash" onclick="removeItem('${name}')"></i>

        </div>

      </div>
    `;
  });

  document.getElementById("total-price").textContent = totalPrice + " ر.س";
}

/*التحكم  */

function plus(name){
  cart[name].qty++;
  save();
}

function minus(name){
  cart[name].qty--;
  if(cart[name].qty <= 0){
    delete cart[name];
  }
  save();
}

function removeItem(name){
  delete cart[name];
  save();
}

function save(){
  localStorage.setItem("cart", JSON.stringify(cart));
  renderCartPage();
}

renderCartPage();






</script>


<script>
async function confirmOrder() {

  const user = firebase.auth().currentUser;
    console.log(user);

if(!user){

    alert("يرجى تسجيل الدخول");

    return;

}

    if(Object.keys(cart).length === 0){
        alert("السلة فارغة");
        return;
    }

    const time =
        document.querySelector(".time.active")?.innerText || "";

    const payment =
        document.querySelector(".pay-card.active .tr")?.innerText || "";

    let items = [];
    let total = 0;

    Object.keys(cart).forEach(name => {

        items.push({
            name: name,
            price: cart[name].price,
            qty: cart[name].qty
        });

        total += cart[name].price * cart[name].qty;

    });
    const customerName =
document.getElementById("customerName").value.trim();

const customerPhone =
document.getElementById("customerPhone").value.trim();

const customerNote =
document.getElementById("customerNote").value.trim();

if(customerPhone==""){
    alert("يرجى إدخال رقم الجوال");
    return;
}

const counterRef = db.collection("settings").doc("counter");

const counterDoc = await counterRef.get();

let orderNumber = 1001;

if(counterDoc.exists){

    orderNumber = counterDoc.data().lastNumber + 1;

}

await counterRef.set({

    lastNumber: orderNumber

});

    try{

        const docRef = await db.collection("orders").add({

    uid: user.uid,

    orderNumber: orderNumber,

    customer: customerName || "عميل",

    phone: customerPhone,

    note: customerNote,

    items: items,

    total: total,

    pickupTime: time,

    payment: payment,

    status: "new",

    createdAt: firebase.firestore.FieldValue.serverTimestamp()

});

// نحفظ رقم المستند حتى تعرضه صفحة النجاح
localStorage.setItem("lastOrderId", docRef.id);

// نحذف السلة فقط
localStorage.removeItem("cart");

// الانتقال لصفحة النجاح
window.location.href = "success.html";

    }catch(err){

        console.log(err);

        console.log(err);

alert(err.message);

    }

}
</script>

<script>
    document.querySelectorAll(".time").forEach(time => {
  time.addEventListener("click", () => {

    // يشيل التحديد من الكل
    document.querySelectorAll(".time").forEach(t => {
      t.classList.remove("active");
    });

    // يحط التحديد على اللي انضغط
    time.classList.add("active");

  });
});

document.querySelectorAll(".pay-card").forEach(card => {
  card.addEventListener("click", () => {

    // نشيل التحديد من الكل
    document.querySelectorAll(".pay-card").forEach(c => {
      c.classList.remove("active");
    });

    // نحط التحديد على المختار
    card.classList.add("active");

  });
});
</script>
