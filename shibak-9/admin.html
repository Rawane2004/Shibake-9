<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>لوحة الإدارة — SHIB AK-9</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap">
<link rel="stylesheet" href="admin.css">
</head>
<body>
<div class="admin-layout">

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="brand">
      <div>
        <div class="logo-text">SHIB AK-9</div>
        <small>لوحة الإدارة</small>
      </div>
    </div>

    <div class="nav-item active" data-page="home"><i class="fa-solid fa-house"></i> الرئيسية</div>
    <div class="nav-item" data-page="products"><i class="fa-solid fa-burger"></i> المنتجات</div>
    <div class="nav-item" data-page="orders"><i class="fa-solid fa-receipt"></i> الطلبات</div>
    <div class="nav-item" data-page="settings"><i class="fa-solid fa-gear"></i> الإعدادات</div>

    <a href="login.html" class="nav-item logout"><i class="fa-solid fa-right-from-bracket"></i> تسجيل الخروج</a>
  </aside>

  <!-- ===== Main ===== -->
  <main class="main">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')">
          <i class="fa-solid fa-bars"></i>
        </button>
        <h1 id="page-title">الرئيسية</h1>
      </div>
      <div class="user"><i class="fa-solid fa-user"></i> الإدارة</div>
    </div>

    <!-- ===== Home ===== -->
    <section class="page" id="page-home">
      <div class="stats">
        <div class="stat-card">
          <div>
            <div class="label">إجمالي المنتجات</div>
            <div class="value" id="stat-products">0</div>
          </div>
          <div class="icon-box"><i class="fa-solid fa-burger"></i></div>
        </div>
        <div class="stat-card">
          <div>
            <div class="label">إجمالي الطلبات</div>
            <div class="value" id="stat-orders">0</div>
          </div>
          <div class="icon-box"><i class="fa-solid fa-receipt"></i></div>
        </div>
        <div class="stat-card dark">
          <div>
            <div class="label">الإيرادات</div>
            <div class="value"><span id="stat-revenue">0</span> ر.س</div>
          </div>
          <div class="icon-box"><i class="fa-solid fa-sack-dollar"></i></div>
        </div>
      </div>

      <div class="section-head"><h2>أحدث الطلبات</h2></div>
      <div class="table-wrap">
        <table>
          <thead>
<tr>
    <th>رقم الطلب</th>
    <th>العميل</th>
    <th>المنتجات</th>
    <th>الإجمالي</th>
    <th>الحالة</th>
    <th>الإجراء</th>
</tr>
</thead>
          <tbody id="recent-orders"></tbody>
        </table>
      </div>
    </section>

    <!-- ===== Products ===== -->
    <section class="page" id="page-products" hidden>
      <div class="section-head">
        <h2>المنتجات</h2>
        <button class="btn primary" onclick="openProductModal()"><i class="fa-solid fa-plus"></i> إضافة منتج</button>
      </div>
      <div class="products-grid" id="products-grid"></div>
    </section>

    <!-- ===== Orders ===== -->
    <section class="page" id="page-orders" hidden>
      <div class="section-head"><h2>الطلبات</h2></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>رقم الطلب</th><th>العميل</th><th>المنتجات</th><th>الإجمالي</th><th>الحالة</th></tr></thead>
          <tbody id="orders-body"></tbody>
        </table>
      </div>
    </section>

    <!-- ===== Settings ===== -->
    <section class="page" id="page-settings" hidden>
      <div class="section-head"><h2>إعدادات المطعم</h2></div>
      <form class="form-card" onsubmit="event.preventDefault(); alert('تم الحفظ');">
        <div class="form-row">
          <label>اسم المطعم</label>
          <input type="text" value="SHIB AK-9">
        </div>
        <div class="form-row">
          <label>رقم الهاتف</label>
          <input type="tel" value="+966 5xxxxxxxx">
        </div>
        <div class="form-row">
          <label>ساعات العمل</label>
          <input type="text" value="٧ صباحاً – ١٢ منتصف الليل">
        </div>
        <button class="btn primary">حفظ التعديلات</button>
      </form>
    </section>
  </main>
</div>

<!-- ===== Product Modal ===== -->
<div class="modal-backdrop" id="product-modal">
  <div class="modal">
    <h3 id="modal-title">إضافة منتج</h3>
    <form id="product-form">
      <input type="hidden" id="p-id">
      <div class="form-row"><label>اسم المنتج</label><input id="p-name" required></div>
      <div class="form-row"><label>السعر (ر.س)</label><input id="p-price" type="number" step="0.5" required></div>
      <div class="form-row">
    <label>الفئة</label>

    <select id="p-cat">
        <option>برجر</option>
        <option>الفطور</option>
        <option>سلطات</option>
        <option>فرايز</option>
        <option>فلافل</option>
        <option>إضافات</option>
    </select>
</div>

<div class="form-row">
    <label>وصف المنتج</label>

    <textarea
        id="p-description"
        rows="4"
        placeholder="اكتب وصفاً مختصراً للمنتج">
    </textarea>

      </div>
      <div class="actions">
        <button type="button" class="btn secondary" onclick="closeProductModal()">إلغاء</button>
        <button type="submit" class="btn primary">حفظ</button>
      </div>
    </form>
  </div>
</div>


<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>

</script>
<script src="admin.js"></script>
</body>
</html>
