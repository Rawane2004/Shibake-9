<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC29y-WhUcevyAzQU4qmkAtN9D1s_4I4xA",
  authDomain: "shibak-9-a3ef3.firebaseapp.com",
  projectId: "shibak-9-a3ef3",
  appId: "1:617992558496:web:8a6ef748c11611d1ad36c5"
};

firebase.initializeApp(firebaseConfig);

// تسجيل الدخول
async function loginUser(){

  const email = document.querySelectorAll("input")[0].value.trim();
  const password = document.querySelectorAll("input")[1].value;

  if(!email || !password){
    alert("عبّ البيانات");
    return;
  }

  try {

    const userCredential = await firebase.auth()
      .signInWithEmailAndPassword(email, password);

    const user = userCredential.user;

    // تحديث بيانات المستخدم من Firebase
await user.reload();

if (!user.emailVerified) {

    await firebase.auth().signOut();

    alert("يجب تأكيد البريد الإلكتروني أولاً.\n\nتحقق من صندوق الوارد ثم سجّل الدخول مرة أخرى.");

    return;

}

  

    const db = firebase.firestore();

    const doc = await db
      .collection("users")
      .doc(user.uid)
      .get();

    if(!doc.exists){

      alert("بيانات المستخدم غير موجودة");

      return;
    }

    const userData = doc.data();

    // حفظ بيانات المستخدم محليًا
      localStorage.setItem("uid", user.uid);
      localStorage.setItem("userName", userData.name);
      localStorage.setItem("userEmail", userData.email);
      localStorage.setItem("userPhone", userData.phone || "");
      localStorage.setItem("userPhoto", userData.photo || "");
      localStorage.setItem("userRole", userData.role);

// التوجيه
if(userData.role === "admin"){

    window.location.href = "admin.html";

}else{

    window.location.href = "index.html";

}

  }catch(error){

    console.error(error);

    alert(error.message);

  }

}

// العين
document.querySelectorAll(".toggle-password").forEach(icon => {

  icon.addEventListener("click", () => {

    const input = icon.previousElementSibling;

    if(input.type === "password"){

      input.type = "text";
      icon.classList.replace("fa-eye","fa-eye-slash");

    } else {

      input.type = "password";
      icon.classList.replace("fa-eye-slash","fa-eye");

    }

  });

});
</script>



</body>
